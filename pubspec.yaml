name: ear_training
description: "Neural Plasticity-Based Auditory Rehabilitation App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  just_audio: ^0.9.38
  audio_session: ^0.1.18
  fl_chart: ^0.68.0
  get_it: ^7.7.0
  provider: ^6.1.2
  supabase_flutter: ^2.8.0
  flutter_dotenv: ^5.1.0
  http: ^1.6.0
  path_provider: ^2.1.5
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/audio/
