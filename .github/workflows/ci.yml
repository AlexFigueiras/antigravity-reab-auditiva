name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  flutter:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # O app espera um .env (carregado via flutter_dotenv como asset).
      # Em CI usamos valores fictícios — segredos reais nunca entram no repo.
      - name: Create dummy .env
        run: |
          cat > .env <<'EOF'
          SUPABASE_URL=https://example.supabase.co
          SUPABASE_ANON_KEY=dummy
          GOOGLE_TTS_API_KEY=dummy
          EOF
          mkdir -p assets/audio
          touch assets/audio/.gitkeep

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test
        continue-on-error: true

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test

  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # O app espera um .env (carregado via flutter_dotenv como asset).
      # ATENÇÃO: estes valores são fictícios. Para o app conectar de verdade
      # ao Supabase, você precisa buildar com suas chaves reais (ver abaixo).
      - name: Create .env
        run: |
          cat > .env <<EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_TTS_API_KEY=${{ secrets.GOOGLE_TTS_API_KEY }}
          EOF
          mkdir -p assets/audio
          touch assets/audio/.gitkeep

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bosyn-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

  build-aab:
    name: Build Release AAB (Play Store)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create .env
        run: |
          cat > .env <<EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_TTS_API_KEY=${{ secrets.GOOGLE_TTS_API_KEY }}
          EOF
          mkdir -p assets/audio
          touch assets/audio/.gitkeep

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > android/app/release.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.jks
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: bosyn-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
